name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'data/**'
      - 'docs/index.html'
      - '.github/workflows/pages.yml'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Bundle data into data.js
        run: |
          python3 -c "
          import json, os, pathlib

          models = []
          for f in pathlib.Path('data/models').glob('*.json'):
              models.append(json.loads(f.read_text()))

          providers = []
          for f in pathlib.Path('data/providers').glob('*.json'):
              providers.append(json.loads(f.read_text()))

          js = 'window.MODELLINK = ' + json.dumps({
              'models': models,
              'providers': providers
          }, ensure_ascii=False) + ';'

          pathlib.Path('docs/data.js').write_text(js, encoding='utf-8')
          print(f'Bundled {len(models)} models, {len(providers)} providers ({len(js)} bytes)')
          "

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
